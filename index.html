<style>
:root{
--bg:#0d0f14;
--card:#161a23;
--accent:#5d8cff;
--accent2:#00e0b8;
--text:#e6edf3;
--muted:#8b949e;
--border:#2a2f3a;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:2rem 1rem;
text-align:center;
border-bottom:1px solid var(--border);
}

.site-title{
font-size:2.8rem;
font-weight:800;
letter-spacing:4px;
background:linear-gradient(90deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
background-clip:text;
-webkit-text-fill-color:transparent;
}

main{
flex:1;
max-width:1100px;
margin:auto;
padding:2rem;
width:100%;
animation:fadeIn .4s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.card{
background:var(--card);
border:1px solid var(--border);
padding:1.5rem;
border-radius:16px;
margin-bottom:1.5rem;
cursor:pointer;
transition:.3s ease;
display:flex;
justify-content:space-between;
align-items:center;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--accent);
box-shadow:0 0 20px rgba(93,140,255,.15);
}

.card-title{
font-weight:600;
font-size:1.2rem;
}

.badge{
background:var(--accent);
padding:.3rem .7rem;
border-radius:20px;
font-size:.75rem;
margin-left:10px;
}

.section{
margin-bottom:3rem;
}

.section h2{
margin-bottom:1rem;
padding-left:12px;
border-left:4px solid var(--accent);
font-size:1.4rem;
}

.section-content p{
margin-bottom:1rem;
line-height:1.7;
color:var(--text);
}

.section-content img{
width:100%;
border-radius:12px;
margin:1rem 0;
border:1px solid var(--border);
}

.code-block{
    position:relative;
    background:#0b1118;
    border:1px solid var(--border);
    border-radius:14px;
    margin-top:1rem;
    overflow:hidden;
}

.code-block pre{
    margin:0;
    padding:1.5rem;
    font-family: "Fira Code", monospace;
    font-size:.9rem;
    line-height:1.6;
    color:#f3f0e6;

    white-space:pre;          /* preserve formatting */
    overflow-x:auto;          /* horizontal scroll */
    overflow-y:auto;          /* vertical scroll */
    max-height:700px;         /* supports very big scripts */
}

.token.comment { color: #6a9955; }        /* Green comments */
.token.string { color: #ce9178; }         /* Soft orange strings */
.token.keyword { color: #569cd6; }        /* Blue keywords */
.token.function { color: #dcdcaa; }       /* Yellow functions */
.token.number { color: #b5cea8; }         /* Light green numbers */
.token.operator { color: #c586c0; }       /* Purple operators */

.flag-block {
    position: relative;
    background: linear-gradient(135deg, #111827, #0b1220);
    border: 1px solid #1f2937;
    border-left: 4px solid #22c55e;
    border-radius: 14px;
    margin-top: 1.5rem;
    overflow: hidden;
}

.flag-block pre {
    margin: 0;
    padding: 1.5rem;
    font-family: "Fira Code", monospace;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;

    background: linear-gradient(90deg, #22c55e, #06b6d4, #22c55e);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: flagShine 4s linear infinite;
}

@keyframes flagShine {
    to { background-position: 200% center; }
}

.copy-btn{
position:absolute;
top:8px;
right:8px;
background:var(--accent);
border:none;
padding:4px 10px;
color:white;
border-radius:6px;
cursor:pointer;
font-size:.7rem;
}

.nav-back{
margin-bottom:2rem;
cursor:pointer;
display:inline-flex;
align-items:center;
gap:8px;
color:var(--accent);
font-size:.9rem;
}

footer{
border-top:1px solid var(--border);
padding:1.5rem;
text-align:center;
font-size:.8rem;
color:var(--muted);
}

.footer-content{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:1rem;
}

.social-links{
display:flex;
gap:1.2rem;
}

.social-icon{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#161a23;
border:1px solid var(--border);
transition:.3s ease;
}

.icon-svg{
width:20px;
height:20px;
fill:#ffffff;
transition:.3s ease;
}

.social-icon:hover{
border-color:var(--accent);
box-shadow:0 0 15px rgba(93,140,255,.5);
transform:translateY(-3px);
}

.social-icon:hover .icon-svg{
fill:var(--accent2);
}

@media(max-width:768px){
main{padding:1rem}
.site-title{font-size:2rem}
}
</style>

solution:[

{type:"text",content:"When we started analyzing the binary in IDA, we noticed that it allocates memory and writes several 128-bit constants into it. These constants did not look like readable text, which suggested that the data was encrypted or obfuscated. After that, the program computes a value called v2 using some arithmetic operations and PEB-related fields such as BeingDebugged and NtGlobalFlag."},

{type:"image",src:"0xmr.org_CTF/enc_nums.png"},

{type:"text",content:"Later in the code, the binary executes this allocated memory as a function and passes v2 as an argument. Since the program is compiled for Windows x64, the first argument is passed in RCX. Inside the shellcode, we found an important instruction: xor al, cl. This tells us that only the lowest 8 bits of RCX (which is CL) are used as the decryption key."},

{type:"image",src:"0xmr.org_CTF/loop.png"},

{type:"text",content:"By analyzing the loop, we saw that the shellcode iterates exactly 25 times (mov r8d, 19h) and XORs each byte of the encrypted data in place. It uses a call/pop trick to get its own address (position-independent code), then applies XOR between each byte and CL. After finishing the loop, it returns a pointer to the decrypted buffer."},

{type:"text",content:"Since CL is only 8 bits, the effective key is v2 & 0xFF. Instead of executing the shellcode, we extracted the encrypted bytes directly from IDA and reproduced the decryption logic in Python. This allowed us to safely recover the hidden string using static analysis only."},

{type:"image",src:"0xmr.org_CTF/enc_flag.png"},

{type:"text",content:"We then recreated the XOR loop in Python using a bytearray to simulate the in-place modification that happens in assembly. By applying XOR with the calculated key for 25 bytes, the encrypted data was successfully decrypted and revealed the hidden string."},

{type:"text",content:"In conclusion, the challenge demonstrates how small shellcode can hide strings using simple XOR obfuscation. By understanding the Windows x64 calling convention, register sizes (especially CL), and loop behavior, we were able to fully reverse the logic without dynamic execution. Static analysis alone was enough to recover the flag."}

import struct


v1 = 0xA5F123C7 ^ (0xA5F123C7 >> 13) # 2784234574
tmp = (1540483477 * v1) & 0xFFFFFFFF # 2079074150
v2 = tmp ^ (tmp >> 15) ^ 0xDEADBEEF # 2772528721

v2_bytes = struct.pack("<I", v2)
arry = [
  0xFB416E51A5A93802,
  0xED416E519487EF19,
  0xA5416E481D00B0DA,
  0xA3C9AF63A3CB7ABA,
  0x5734A6AEE4879119,
  0x6209AD0AFB82E519,
  0x661A3051A5416E91,
  0xC1247D7B867D4730,
  0x9C536033A64F5C31,
  0x8923586EC7210E34
]

puf = bytearray()

for i in arry:

  puf += struct.pack("<Q", i)

puf.append(0x0A)


for i in range(0, 0x51, 9):  # 0x51 = 81
    
    v5 = v2_bytes[i & 3]
    v6 = v2_bytes[(i + 1) & 3]
    v7 = v2_bytes[(i - 2) & 3]
    v8 = v2_bytes[(i - 1) & 3]

    if i + 8 < len(puf):
        puf[i + 0] ^= v5
        puf[i + 1] ^= v6
        puf[i + 2] ^= v7
        puf[i + 3] ^= v8
        puf[i + 4] ^= v5
        puf[i + 5] ^= v6
        puf[i + 6] ^= v7
        puf[i + 7] ^= v8
        puf[i + 8] ^= v5

with open("shellcode.bin", "wb") as f:
    f.write(puf)

# This is the code that decrypted the flag 
# using the key obtained in the previous code.

v2 = 4289013449349099089
key = v2 & 0xFF

0x61,0x29,0x3C,0x23,
0x2A,0x13,0x65,0x64,
0x60,0x32,0x0E,0x03,
0x62,0x0E,0x12,0x39,
0x65,0x60,0x60,0x62,
0x3F,0x36,0x62,0x2C
])

decoded = bytes([b ^ key for b in data])

print(decoded.decode())`,

function renderWriteup(ci,wi){

app.appendChild(createSection("Description",w.description));

app.appendChild(sol);

codeSection.className="section";
codeSection.innerHTML="<h2>Code</h2>";
codeSection.appendChild(createCodeBlock(w.code, w.lang || "python"));
app.appendChild(codeSection);
}

function createSection(title,content){
const section=document.createElement("div");
section.className="section";
section.innerHTML=`<h2>${title}</h2>`;
const div=document.createElement("div");
div.className="section-content";

content.forEach(item=>{
if(item.type==="text"){
const p=document.createElement("p");
p.textContent=item.content;
div.appendChild(p);
}
if(item.type==="image"){
const img=document.createElement("img");
img.src=item.src;
div.appendChild(img);
}
});

section.appendChild(div);
return section;
}

function createCodeBlock(text, lang="python"){
    const block = document.createElement("div");
    block.className = "code-block";

    const button = document.createElement("button");
    button.className = "copy-btn";
    button.innerText = "Copy";
    button.onclick = function(){ copyText(this); };

    const pre = document.createElement("pre");
    const code = document.createElement("code");

    code.className = "language-" + lang;
    code.textContent = text;

    pre.appendChild(code);
    block.appendChild(button);
    block.appendChild(pre);

    setTimeout(() => Prism.highlightElement(code), 0);

    return block;
}

function copyText(btn){
const text=btn.nextElementSibling.innerText;
navigator.clipboard.writeText(text);
btn.innerText="Copied";
setTimeout(()=>btn.innerText="Copy",1500);
}

function animatedIcon(){
return `
<svg width="24" height="24" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="10" stroke="#5d8cff" stroke-width="2" fill="none">
<animate attributeName="stroke-dasharray" values="0,200;100,200;0,200" dur="3s" repeatCount="indefinite"/>
</circle>
</svg>
`;
}

function backIcon(){
return `
<svg width="18" height="18" viewBox="0 0 24 24">
<path d="M15 18l-6-6 6-6" stroke="#5d8cff" stroke-width="2" fill="none"/>
</svg>

}

function createFlagBlock(text){
    const block = document.createElement("div");
    block.className = "flag-block";

    const button = document.createElement("button");
    button.className = "copy-btn";
    button.innerText = "Copy";
    button.onclick = function(){ copyText(this); };

    const pre = document.createElement("pre");
    pre.textContent = text;

    block.appendChild(button);
    block.appendChild(pre);

    return block;
}
